<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Night</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        h2 {
            color: #764ba2;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Setup Screen */
        .category-selection {
            margin-bottom: 30px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .category-item {
            padding: 15px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-item:hover {
            background: #e0e0e0;
        }

        .category-item.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .team-setup {
            margin: 30px 0;
        }

        .slider-container {
            margin: 20px 0;
        }

        .slider {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .slider-value {
            text-align: center;
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 5px;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: #667eea;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        /* Game Screen */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-card {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            min-height: 200px;
        }

        .question-text {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .answer-section {
            margin-top: 20px;
            padding: 20px;
            background: #e9ecef;
            border-radius: 10px;
            display: none;
        }

        .answer-section.show {
            display: block;
        }

        .answer-text {
            font-size: 1.3em;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .answer-facts {
          font-size: 1em;
          color: #333;
          margin-bottom: 15px;
          margin-top: 15px;
          padding: 15px;
          background-color: #f9f9f9;
          border-left: 4px solid #667eea;
          border-radius: 4px;
          line-height: 1.6;
        }

        .team-selection {
            margin-top: 20px;
        }

        .team-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .team-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .team-btn.selected {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .team-btn.red { background: #ff6b6b; color: white; }
        .team-btn.green { background: #51cf66; color: white; }
        .team-btn.blue { background: #339af0; color: white; }
        .team-btn.yellow { background: #ffd43b; color: #333; }
        .team-btn.purple { background: #b197fc; color: white; }
        .team-btn.black { background: #212529; color: white; }

        /* Leaderboard */
        .leaderboard {
            margin-top: 30px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .leaderboard-table th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .leaderboard-table tr:hover {
            background: #f8f9fa;
        }

        .rank {
            font-size: 1.5em;
            font-weight: bold;
        }

        .team-color {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }

        .score {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .progress {
            text-align: center;
            color: #666;
            margin: 20px 0;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Setup Screen -->
        <div id="setupScreen" class="screen active">

            <div class="category-selection">

                <div id="categoryGrid" class="category-grid"></div>
            </div>

            <div class="team-setup">

                    <div class="slider-value" id="teamCount">4 Teams</div>
                </div>
            </div>

            <div class="button-group">
                <button onclick="startGame()" class="btn-primary">Start Game</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="gameScreen" class="screen">
            <div class="game-header">
                <h1>🎯 Question Time</h1>
                <div>
                    <button onclick="showLeaderboardModal()" class="btn-success">📊 Leaderboard</button>
                    <button onclick="showSettings()" class="btn-warning">⚙️ Settings</button>
                </div>
            </div>

            <div class="progress" id="progress"></div>

            <div class="question-card">
                <div class="question-text" id="questionText"></div>

                <div class="button-group">
                    <button id="revealBtn" onclick="revealAnswer()" class="btn-primary">Reveal Answer</button>
                </div>

                <div id="answerSection" class="answer-section">
                    <div class="answer-text" id="answerText"></div>
                    <div class="answer-facts" id="answerFacts" style="display:none"></div>

                    <div class="team-selection">
                        <h3>Which teams got it right?</h3>
                        <div id="teamButtons" class="team-buttons"></div>
                    </div>

                    <div class="button-group">
                        <button onclick="submitScores()" class="btn-success">Submit & Next Question</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settingsScreen" class="screen">
            <h1>⚙️ Settings</h1>

            <div class="leaderboard">
                <h2>Final Leaderboard</h2>
                <table class="leaderboard-table" id="finalLeaderboard">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Team</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="finalLeaderboardBody"></tbody>
                </table>
            </div>

            <div class="button-group">
                <button onclick="restartGame()" class="btn-danger">Restart Game</button>
                <button onclick="backToGame()" class="btn-primary">Back to Game</button>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal">
        <div class="modal-content">
            <h2>📊 Current Standings</h2>

                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Team</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="modalLeaderboardBody"></tbody>
            </table>
            <div class="button-group">
                <button class="btn-primary">Close</button>
            </div>
        </div>
    </div>

        // Initialize - questions are already embedded!
        function loadQuestions() {
            displayCategories();
        }

        // Display available categories
        function displayCategories() {
            const grid = document.getElementById('categoryGrid');
            grid.innerHTML = '';

            questionsData.categories.forEach((category, index) => {
                const div = document.createElement('div');
                div.className = 'category-item';
                div.textContent = category.name;
                div.onclick = () => toggleCategory(index, div);
                grid.appendChild(div);
            });
        }

        // Toggle category selection
        function toggleCategory(index, element) {
            const categoryName = questionsData.categories[index].name;
            const idx = selectedCategories.indexOf(categoryName);

            if (idx > -1) {
                selectedCategories.splice(idx, 1);
                element.classList.remove('selected');
            } else {
                selectedCategories.push(categoryName);
                element.classList.add('selected');
            }
        }

        // Team slider
        document.getElementById('teamSlider').addEventListener('input', function() {
            document.getElementById('teamCount').textContent = `${this.value} Teams`;
        });

        // Start the game
        function startGame() {
            if (selectedCategories.length === 0) {
                alert('Please select at least one category!');
                return;
            }

            const numTeams = parseInt(document.getElementById('teamSlider').value);

            // Create teams with random funky names
            teams = [];
            const shuffledNames = [...funkyNames].sort(() => Math.random() - 0.5);

            for (let i = 0; i < numTeams; i++) {
                teams.push({
                    name: shuffledNames[i],
                    color: teamColors[i],
                    score: 0
                });
            }

            // Build question pool from selected categories
            questionPool = [];
            questionsData.categories.forEach(category => {
                if (selectedCategories.includes(category.name)) {
                    category.questions.forEach(q => {
                      questionPool.push({
                        category: category.name,
                        question: q.question,
                        answer: q.answer,
                        facts: q.facts || '',
                        explanation: q.explanation || q.explain || ''
                      });
                    });
                }
            });

            // Shuffle question pool
            questionPool.sort(() => Math.random() - 0.5);
            usedQuestions = [];

            // Switch to game screen
            showScreen('gameScreen');
            showInitialStandings();
        }

        // Load next question
        function loadNextQuestion() {
            if (questionPool.length === 0) {
                alert('No more questions available!');
                showSettings();
                return;
            }

            currentQuestion = questionPool.shift();
            usedQuestions.push(currentQuestion);

            document.getElementById('questionText').textContent = currentQuestion.question;
            document.getElementById('answerSection').classList.remove('show');
            document.getElementById('revealBtn').disabled = false;

            selectedTeams = [];
            updateProgress();
        }

        // Reveal answer
        function revealAnswer() {
            document.getElementById('answerText').textContent = `Answer: ${currentQuestion.answer}`;
            // Show facts if present (check facts, explanation, or explain fields)
            const facts = currentQuestion.facts || currentQuestion.explanation || currentQuestion.explain || '';
            const factsEl = document.getElementById('answerFacts');
            console.log('[DEBUG] Current Question:', currentQuestion);
            console.log('[DEBUG] Facts:', facts);
            if (facts && facts.trim() !== '') {
              factsEl.style.display = 'block';
              factsEl.textContent = facts;
              console.log('[DEBUG] Facts displayed');
            } else {
              factsEl.style.display = 'none';
              factsEl.textContent = '';
              console.log('[DEBUG] No facts available');
            }

            // Image support removed — only text facts shown.
            document.getElementById('answerSection').classList.add('show');
            document.getElementById('revealBtn').disabled = true;

            // Create team buttons
            const container = document.getElementById('teamButtons');
            container.innerHTML = '';

            teams.forEach((team, index) => {
                const btn = document.createElement('button');
                btn.className = `team-btn ${team.color}`;
                btn.textContent = team.name;
                btn.onclick = () => toggleTeamSelection(index, btn);
                container.appendChild(btn);
            });
        }

        // Toggle team selection
        function toggleTeamSelection(index, button) {
            const idx = selectedTeams.indexOf(index);

            if (idx > -1) {
                selectedTeams.splice(idx, 1);
                button.classList.remove('selected');
            } else {
                selectedTeams.push(index);
                button.classList.add('selected');
            }
        }

        // Submit scores and go to next question
        function submitScores() {
            if (selectedTeams.length === 0) {
                // No teams answered, just move to next question
                loadNextQuestion();
                return;
            }

            const pointsPerTeam = selectedTeams.length === 1 ? 10 : 5;

            selectedTeams.forEach(teamIndex => {
                teams[teamIndex].score += pointsPerTeam;
            });

            loadNextQuestion();
        }

        // Update progress
        function updateProgress() {
            const total = usedQuestions.length + questionPool.length;
            const current = usedQuestions.length;
            document.getElementById('progress').textContent =
                `Question ${current} of ${total} | ${questionPool.length} remaining`;
        }

        // Show initial team standings before first question
        function showInitialStandings() {
            updateLeaderboard('modalLeaderboardBody');
            const modal = document.getElementById('leaderboardModal');
            const button = modal.querySelector('.button-group button');
            const heading = modal.querySelector('h2');
            
            heading.textContent = '📊 Team Standings - Ready to Begin?';
            button.textContent = 'Start Playing';
            button.onclick = () => {
                closeLeaderboardModal();
                loadNextQuestion();
            };
            modal.classList.add('show');
        }

        // Show leaderboard modal
        function showLeaderboardModal() {
            const modal = document.getElementById('leaderboardModal');
            const button = modal.querySelector('.button-group button');
            const heading = modal.querySelector('h2');
            
            heading.textContent = '📊 Current Standings';
            button.textContent = 'Close';
            button.onclick = closeLeaderboardModal;
            
            updateLeaderboard('modalLeaderboardBody');
            modal.classList.add('show');
        }

        // Close leaderboard modal
        function closeLeaderboardModal() {
            document.getElementById('leaderboardModal').classList.remove('show');
        }

        // Update leaderboard
        function updateLeaderboard(bodyId) {
            const tbody = document.getElementById(bodyId);
            tbody.innerHTML = '';

            const sortedTeams = [...teams].sort((a, b) => b.score - a.score);

            sortedTeams.forEach((team, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="rank">#${index + 1}</td>
                    <td>
                        <span class="team-color" style="background: ${getColorCode(team.color)}"></span>
                        ${team.name}
                    </td>
                    <td class="score">${team.score}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Get color code
        function getColorCode(color) {
            const colors = {
                red: '#ff6b6b',
                green: '#51cf66',
                blue: '#339af0',
                yellow: '#ffd43b',
                purple: '#b197fc',
                black: '#212529'
            };
            return colors[color] || '#ccc';
        }

        // Show settings
        function showSettings() {
            updateLeaderboard('finalLeaderboardBody');
            showScreen('settingsScreen');
        }

        // Back to game
        function backToGame() {
            if (questionPool.length > 0 || currentQuestion) {
                showScreen('gameScreen');
            } else {
                alert('No questions available. Please restart the game.');
            }
        }

        // Restart game
        function restartGame() {
            selectedCategories = [];
            teams = [];
            questionPool = [];
            usedQuestions = [];
            currentQuestion = null;

            // Reset category selection UI
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('selected');
            });

            document.getElementById('teamSlider').value = 4;
            document.getElementById('teamCount').textContent = '4 Teams';

            showScreen('setupScreen');
        }

        // Show screen
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', loadQuestions);
    </script>
